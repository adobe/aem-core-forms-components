$id: field.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: Field JCR Authoring Properties
description: >-
  Properties for all leaf field components (text-input, number-input, etc.),
  derived from AbstractFieldImpl. Extends base.authoring.schema.
allOf:
  - $ref: ./base.authoring.schema.yaml
  - type: object
    properties:
      # --- Interaction ---
      readOnly:
        type: [boolean, string]
        title: Read-only
        default: false
        description: Omit from JCR when false — absent property = runtime default false.

      # --- Default & empty value ---
      default:
        title: Default value
        description: >-
          Initial value when the form loads without pre-fill data. Type must
          match the field's `type` property. Stored as JCR multi-value property.
        oneOf:
          - type: ["string", "number", "boolean"]
          - type: array
            items:
              type: ["string", "number", "boolean"]
      "fd:multiDefaultValues":
        title: Multi-value default (options fields)
        description: >-
          Used by AbstractOptionsFieldImpl for options fields (dropdown, checkboxgroup, etc.)
          where the default is a multi-value selection. Stored as JCR multi-value property.
          Distinct from `default` which is used on non-options fields.
        type: array
        items:
          type: ["string", "number", "boolean"]

      "fd:emptyValue":
        type: string
        title: Empty value
        description: >-
          Value submitted when the user leaves the field empty.
          Stored as JCR String. Sling model maps to EmptyValue enum.
        enum: ["null", "undefined", ""]

      # --- Placeholder ---
      placeholder:
        type: string
        title: Placeholder text
        description: Ghosted hint text shown inside the empty widget.

      # --- Formats ---
      displayFormat:
        type: string
        title: Display format
        description: >-
          Format pattern for displaying the value to the user (e.g. date/number
          locale format).
      "fd:customDisplayFormat":
        type: string
        title: Custom display format (overrides displayFormat)
        description: >-
          Freeform display format clause. When present it overrides displayFormat.
      editFormat:
        type: string
        title: Edit format
        description: Format pattern for value entry (e.g. German number separators).
      displayValueExpression:
        type: string
        title: Display value expression (json-formula)
        description: >-
          A json-formula expression whose result is shown in the field instead of
          the raw value. Useful for masking, formatting computed display.
      dataFormat:
        type: string
        title: Data / submission format
        description: Format in which the value is exported or submitted.

      # --- String constraints ---
      minLength:
        type: [integer, string]
        title: Minimum length
      maxLength:
        type: [integer, string]
        title: Maximum length
      minLengthMessage:
        type: string
        title: Min length constraint message
      maxLengthMessage:
        type: string
        title: Max length constraint message
      pattern:
        type: string
        title: Regex validation pattern
      validatePictureClauseMessage:
        title: Pattern constraint message
        description: >-
          Granite dialog may write this as a JCR multi-value String[] (same quirk as
          minLength/maxLength). Sling model reads first value via @ValueMapValue.
        type: [string, array]
        items:
          type: string

      # --- Number / Date constraints ---
      minimum:
        title: Minimum value (inclusive)
        description: Stored as String or Long. Accepts number or ISO date string.
        oneOf:
          - type: number
          - type: string
      maximum:
        title: Maximum value (inclusive)
        description: Stored as String or Long.
        oneOf:
          - type: number
          - type: string
      exclusiveMinimum:
        type: boolean
        title: Exclusive minimum flag
        default: false
        description: >-
          JCR authoring layer stores this as a Boolean flag (true = exclusive).
          Note: the af2-docs runtime schema types exclusiveMinimum/exclusiveMaximum as
          number|date values (Draft 7 style). The JCR layer uses boolean flags and the
          Sling model (AbstractFieldImpl) has @Default(booleanValues=false). These are
          reconciled by the model's getMaximum()/getMinimum() methods.
          Omit from JCR when false — absent property = false (via @Default).
          This flag is a computation input only; it is NOT directly serialized to JSON
          (no public JSON getter — output is via getExclusiveMinimumDate() for date fields).
      exclusiveMaximum:
        type: boolean
        title: Exclusive maximum flag
        default: false
        description: >-
          See exclusiveMinimum note above.
          Omit from JCR when false — absent property = false (via @Default).
          Computation input only; NOT directly serialized to JSON.
      minimumDate:
        type: string
        title: Minimum date (JCR Date property)
        description: >-
          JCR Date property serialized by .infinity.json as a JS toUTCString() value
          (e.g. "Wed Jul 10 2024 00:00:00 GMT+0000"), NOT ISO 8601. No format constraint.
      maximumDate:
        type: string
        title: Maximum date (JCR Date property)
        description: >-
          JCR Date property serialized by .infinity.json as a JS toUTCString() value
          (e.g. "Wed Jul 10 2024 00:00:00 GMT+0000"), NOT ISO 8601. No format constraint.
      minimumDateTime:
        type: string
        title: Minimum date-time (JCR Date property)
        description: >-
          JCR Date property serialized by .infinity.json as a JS toUTCString() value
          (e.g. "Thu Jul 17 2025 16:43:00 GMT+0000"), NOT ISO 8601. No format constraint.
      maximumDateTime:
        type: string
        title: Maximum date-time (JCR Date property)
        description: >-
          JCR Date property serialized by .infinity.json as a JS toUTCString() value
          (e.g. "Thu Jul 17 2025 16:43:00 GMT+0000"), NOT ISO 8601. No format constraint.
      minimumMessage:
        type: string
        title: Minimum constraint message
      maximumMessage:
        type: string
        title: Maximum constraint message

      # --- Format / type constraint messages ---
      typeMessage:
        type: string
        title: Type constraint message
      formatMessage:
        type: string
        title: Format constraint message
      stepMessage:
        type: string
        title: Step constraint message
