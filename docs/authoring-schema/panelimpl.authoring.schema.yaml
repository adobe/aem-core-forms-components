$id: panelimpl.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: PanelImpl JCR Authoring Properties
description: >-
  Properties shared by all components backed by PanelImpl:
  accordion, panelcontainer, tabsontop, verticaltabs, and wizard.
  PanelImpl extends AbstractContainerImpl which extends AbstractFormComponentImpl.
  These properties are NOT in container.authoring.schema.yaml because they are
  specific to PanelImpl, not to all containers.
allOf:
  - $ref: ./container.authoring.schema.yaml
  - type: object
    properties:
      readOnly:
        type: boolean
        title: Read only
        description: >-
          When true the panel and all its children are rendered as read-only.
          Injected by PanelImpl via PN_READ_ONLY (@ValueMapValue, @Nullable Boolean).
          Boxed Boolean — null when absent (treated as false by runtime).
      wrapData:
        type: boolean
        title: Wrap data
        description: >-
          When true forces the panel type to "object" regardless of dataRef.
          Injected by PanelImpl via PN_WRAP_DATA (@ValueMapValue).
          Note: @JsonIgnore — not emitted to the JSON model; affects getType() logic only.
      breakBeforeText:
        type: string
        title: DOR — break before text
        description: >-
          Document of Record page-break control before this panel.
          Injected by PanelImpl via PN_BREAK_BEFORE_TEXT (@ValueMapValue, @Nullable String).
      breakAfterText:
        type: string
        title: DOR — break after text
        description: >-
          Document of Record page-break control after this panel.
          Injected by PanelImpl via PN_BREAK_AFTER_TEXT (@ValueMapValue, @Nullable String).
      overflowText:
        type: string
        title: DOR — overflow text
        description: >-
          Document of Record overflow handling text.
          Injected by PanelImpl via PN_OVERFLOW_TEXT (@ValueMapValue, @Nullable String).
