$id: container.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: Container JCR Authoring Properties
description: >-
  Properties for container (panel) components derived from AbstractContainerImpl.
  Extends base.authoring.schema.
allOf:
  - $ref: ./base.authoring.schema.yaml
  - type: object
    properties:
      lazy:
        type: boolean
        title: Lazy load children
        description: >-
          When true the container defers loading its children until the user
          navigates to it. Requires fragmentPath to be set.
      fragmentPath:
        type: string
        title: Fragment path (for lazy containers)
        description: >-
          Path to a fragment definition when lazy=true.
    patternProperties:
      ".*":
        if:
          type: object
          required: [fieldType]
        then:
          $ref: ./adaptive-form-component.authoring.schema.yaml
        else: true
