$id: adaptive-form-component.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: Adaptive Form Component JCR Authoring Schema (Root)
description: >-
  Root schema for validating any Adaptive Form component's JCR node.
  Uses oneOf discriminated by the fieldType property to select the
  correct per-component schema for validation.

  Usage: validate any component's JCR ValueMap (as JSON) against this schema.
  The correct component schema is selected based on the fieldType value
  combined with fd:viewType where needed (e.g. image, signature/scribble).

  NOTE: each branch uses else: false so that non-matching branches fail
  (required for oneOf semantics — without else, a false if is trivially valid,
  causing all N-1 non-matching branches to also pass and breaking oneOf).

oneOf:
  - title: form (container)
    if:
      properties:
        fieldType:
          const: form
    then:
      $ref: ./components/formcontainer.authoring.schema.yaml
    else: false

  - title: text-input
    if:
      properties:
        fieldType:
          const: text-input
        "fd:viewType":
          not:
            const: signature
    then:
      $ref: ./components/textinput.authoring.schema.yaml
    else: false

  - title: multiline-input
    if:
      properties:
        fieldType:
          const: multiline-input
    then:
      $ref: ./components/textinput.authoring.schema.yaml
    else: false

  - title: email
    if:
      properties:
        fieldType:
          const: email
    then:
      $ref: ./components/emailinput.authoring.schema.yaml
    else: false

  - title: tel
    if:
      properties:
        fieldType:
          const: tel
    then:
      $ref: ./components/telephoneinput.authoring.schema.yaml
    else: false

  - title: number-input
    if:
      properties:
        fieldType:
          const: number-input
    then:
      $ref: ./components/numberinput.authoring.schema.yaml
    else: false

  - title: date-input
    if:
      properties:
        fieldType:
          const: date-input
    then:
      $ref: ./components/datepicker.authoring.schema.yaml
    else: false

  - title: datetime-input
    if:
      properties:
        fieldType:
          const: datetime-input
    then:
      $ref: ./components/datetime.authoring.schema.yaml
    else: false

  - title: file-input
    if:
      properties:
        fieldType:
          const: file-input
        "fd:viewType":
          not:
            const: signature
    then:
      $ref: ./components/fileinput.authoring.schema.yaml
    else: false

  - title: scribble (signature)
    if:
      required: ["fd:viewType"]
      properties:
        "fd:viewType":
          const: signature
    then:
      $ref: ./components/scribble.authoring.schema.yaml
    else: false

  - title: drop-down
    if:
      properties:
        fieldType:
          const: drop-down
    then:
      $ref: ./components/dropdown.authoring.schema.yaml
    else: false

  - title: radio-group
    if:
      properties:
        fieldType:
          const: radio-group
    then:
      $ref: ./components/radiobutton.authoring.schema.yaml
    else: false

  - title: checkbox-group
    if:
      properties:
        fieldType:
          const: checkbox-group
    then:
      $ref: ./components/checkboxgroup.authoring.schema.yaml
    else: false

  - title: checkbox
    if:
      properties:
        fieldType:
          const: checkbox
    then:
      $ref: ./components/checkbox.authoring.schema.yaml
    else: false

  - title: switch
    if:
      properties:
        fieldType:
          const: switch
    then:
      $ref: ./components/switch.authoring.schema.yaml
    else: false

  - title: image
    if:
      properties:
        fieldType:
          const: image
    then:
      $ref: ./components/image.authoring.schema.yaml
    else: false

  - title: button
    if:
      properties:
        fieldType:
          const: button
    then:
      $ref: ./components/button.authoring.schema.yaml
    else: false

  - title: plain-text
    if:
      properties:
        fieldType:
          const: plain-text
    then:
      $ref: ./components/text.authoring.schema.yaml
    else: false

  - title: text (alias for plain-text)
    description: >-
      Legacy/example fieldType="text" — same schema as plain-text.
      Used by forms-components-examples and some older component implementations.
    if:
      properties:
        fieldType:
          const: text
    then:
      $ref: ./components/text.authoring.schema.yaml
    else: false

  - title: panel
    if:
      properties:
        fieldType:
          const: panel
        "fd:viewType":
          not:
            enum: [fragment, ""]
    then:
      $ref: ./components/panelcontainer.authoring.schema.yaml
    else: false

  - title: fragment
    if:
      required: ["fd:viewType"]
      properties:
        "fd:viewType":
          const: fragment
    then:
      $ref: ./components/fragment.authoring.schema.yaml
    else: false

  - title: captcha
    description: >-
      All captcha variants (reCAPTCHA, hCaptcha, Turnstile). The captcha type is
      determined by sling:resourceType — fd:viewType is NOT written to JCR for any
      captcha component. The shared captcha schema covers common properties across
      all three implementations.
    if:
      properties:
        fieldType:
          const: captcha
    then:
      $ref: ./components/captcha.authoring.schema.yaml
    else: false
