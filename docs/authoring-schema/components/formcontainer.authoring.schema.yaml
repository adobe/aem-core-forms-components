$id: formcontainer.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: FormContainer JCR Authoring Properties
description: >-
  Properties for the Adaptive Form Container (guideContainer). All submission and
  auto-save properties are stored as FLAT properties on this node — NOT as child nodes.
  The runtime JSON model groups them under "fd:submit" and "fd:autoSave" keys for
  convenience, but those groupings exist only in the JSON output, not in JCR.
  JCR resource types:
    core/fd/components/form/container/v1/container  (FormContainerImpl v1)
    core/fd/components/form/container/v2/container  (FormContainerImpl v2)
allOf:
  - $ref: ../container.authoring.schema.yaml
  - type: object
    properties:

      # -----------------------------------------------------------------------
      # Auto-save (flat JCR properties — appear grouped under fd:autoSave in
      # the JSON model output only, via AutoSaveConfigurationImpl injected
      # with @Self into FormContainerImpl v2)
      # -----------------------------------------------------------------------
      "fd:enableAutoSave":
        type: boolean
        default: false
        title: Enable auto-save
        description: >-
          Flat JCR property on the FormContainer node. Read by
          AutoSaveConfigurationImpl (@ValueMapValue FD_ENABLE_AUTO_SAVE).
          Appears grouped under "fd:autoSave" in the JSON model output only.
          v2 only.

      "fd:autoSaveStrategyType":
        type: string
        title: Auto-save strategy type
        description: >-
          Flat JCR property on the FormContainer node. Read by
          AutoSaveConfigurationImpl (@ValueMapValue FD_AUTO_SAVE_STRATEGY_TYPE).
          The raw string is converted to an AutoSaveStrategyType enum at
          PostConstruct time. Appears grouped under "fd:autoSave" in JSON output.
          v2 only.
        enum: [time, fieldFocus]

      "fd:autoSaveInterval":
        type: [integer, string]
        title: Auto-save interval (seconds)
        description: >-
          Flat JCR property on the FormContainer node. Read by
          AutoSaveConfigurationImpl (@ValueMapValue FD_AUTO_SAVE_INTERVAL).
          Specifies the polling interval in seconds when strategy is "time".
          Appears grouped under "fd:autoSave" in JSON output. v2 only.

      # -----------------------------------------------------------------------
      # Submission (flat JCR properties — appear grouped under fd:submit in
      # the JSON model output only, via FormContainerImpl v2 getSubmitProperties())
      # -----------------------------------------------------------------------
      actionType:
        type: string
        title: Submit action type
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_SUBMIT_ACTION_TYPE. Collected by
          getSubmitProperties() and emitted under "fd:submit" in JSON output.

      actionName:
        type: string
        title: Submit action name
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_SUBMIT_ACTION_NAME. Collected by
          getSubmitProperties() and emitted under "fd:submit" in JSON output.

      mailto:
        type: string
        title: Email — To
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_SUBMIT_EMAIL_TO. Collected by
          getSubmitProperties() and emitted nested under "fd:submit.email"
          in JSON output.

      from:
        type: string
        title: Email — From
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_SUBMIT_EMAIL_FROM. Emitted nested under
          "fd:submit.email" in JSON output.

      subject:
        type: string
        title: Email — Subject
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_SUBMIT_EMAIL_SUBJECT. Emitted nested under
          "fd:submit.email" in JSON output.

      cc:
        type: string
        title: Email — CC
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_SUBMIT_EMAIL_CC. Emitted nested under
          "fd:submit.email" in JSON output.

      bcc:
        type: string
        title: Email — BCC
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_SUBMIT_EMAIL_BCC. Emitted nested under
          "fd:submit.email" in JSON output.

      spreadsheetUrl:
        type: string
        title: Spreadsheet URL
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_SUBMIT_SPREADSHEETURL. Emitted nested under
          "fd:submit.spreadsheet" in JSON output.

      # -----------------------------------------------------------------------
      # Post-submission / Thank-you
      # -----------------------------------------------------------------------
      thankYouOption:
        type: string
        title: Thank-you option
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_THANK_YOU_OPTION. Determines whether a
          message or a redirect URL is shown after successful submission.
          Injected by FormContainerImpl v2 (@ValueMapValue). v2 only.
        enum: [message, redirect, page]

      thankYouMessage:
        type: string
        title: Thank-you message (v2)
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_THANK_YOU_MSG_V2 ("thankYouMessage" — capital Y).
          Injected by FormContainerImpl v2 (@ValueMapValue). v2 only.

      thankyouMessage:
        type: string
        title: Thank-you message (v1)
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_THANK_YOU_MSG_V1 ("thankyouMessage" — lowercase y).
          Injected by FormContainerImpl v1 (@ValueMapValue). v1 only.

      redirect:
        type: string
        title: Redirect URL
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_REDIRECT. Path or URL to redirect to after
          a successful form submission when thankYouOption is "redirect".
          Injected by FormContainerImpl v2 (@ValueMapValue). v2 only.

      # -----------------------------------------------------------------------
      # General
      # -----------------------------------------------------------------------
      prefillService:
        type: string
        title: Prefill service
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_PREFILL_SERVICE. Sling selector string used
          to resolve the prefill service. Injected by FormContainerImpl v2
          (@ValueMapValue). When non-blank, fd:formDataEnabled is set to true
          in JSON output. v2 only.

      specVersion:
        type: string
        title: Adaptive Forms spec version
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_SPEC_VERSION. Defaults to
          FormContainer.DEFAULT_FORMS_SPEC_VERSION when not present.
          Injected by FormContainerImpl v2 (@ValueMapValue). v2 only.
        examples: ["1.0.0"]

      clientLibRef:
        type: string
        title: Client library reference
        description: >-
          Flat JCR property on the FormContainer node. Corresponds to
          ReservedProperties.PN_CLIENTLIB_REF. Custom client library category
          added to the page's client libraries at runtime via FormClientLibManager.
          Injected by FormContainerImpl v2 (@ValueMapValue). v2 only.

      # -----------------------------------------------------------------------
      # v2-only child node: fd:view/print
      # This is a GENUINE JCR child node, NOT a flat property.
      # Path relative to the FormContainer node: fd:view/print
      # -----------------------------------------------------------------------
      "fd:view/print":
        type: object
        title: DOR print view settings (v2 child node)
        description: >-
          This is a genuine JCR child node located at the relative path
          "fd:view/print" under the FormContainer node. It is NOT a flat
          property. Read by FormContainerImpl v2 initExcludeFromDoRIfHidden()
          via resource.getChild("fd:view/print"). v2 only.
        properties:
          excludeFromDoRIfHidden:
            type: boolean
            default: false
            title: Exclude hidden fields from Document of Record
            description: >-
              When true, fields hidden at submission time are excluded from
              the generated Document of Record. Stored at the child node
              path fd:view/print. Corresponds to
              ReservedProperties.FD_EXCLUDE_FROM_DOR_IF_HIDDEN
              ("fd:excludeFromDoRIfHidden") in getDorProperties() output.
