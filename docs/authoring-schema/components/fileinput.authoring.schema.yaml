$id: fileinput.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: FileInput JCR Authoring Properties
description: >-
  Properties for the Adaptive Form File Input component (file-input field type).
allOf:
  - $ref: ../field.authoring.schema.yaml
  - type: object
    properties:
      multiSelection:
        type: [boolean, string]
        title: Allow multiple attachments
        default: false
        description: >-
          When true the widget allows selecting or uploading multiple files.
          Stored as JCR Boolean. Injected by FileInputImpl as PN_MULTISELECTION.
          Omit from JCR when false — absent property = runtime default false.
      accept:
        type: array
        items:
          type: string
        title: Accepted MIME types
        description: >-
          IANA media types accepted (e.g. ["application/pdf", "image/*"]).
          Stored as JCR String[] (multi-value). Injected by FileInputImpl as PN_FILE_ACCEPT.
      "fd:acceptExtensions":
        type: array
        items:
          type: string
        title: Accepted file extensions
        description: >-
          Additional accepted file extensions beyond MIME types.
          Stored as JCR String[]. Injected by FileInputImpl as FD_FILE_ACCEPT_EXTENSIONS.
      maxFileSize:
        type: string
        title: Maximum file size
        description: >-
          Maximum allowed file size in MB as a plain number string (e.g. "5").
          The Sling model appends "MB" when exporting. Stored as JCR String.
          Injected by FileInputImpl as PN_MAX_FILE_SIZE.
      maxFileSizeMessage:
        type: string
        title: Max file size constraint message
        description: Error shown when an uploaded file exceeds maxFileSize.
      acceptMessage:
        type: string
        title: Accept constraint message
        description: Error shown when an uploaded file type is not in the accepted list.
      dragDropText:
        type: string
        title: Drag-and-drop area text (v1/v2)
        description: >-
          Label shown in the drag-and-drop zone. Stored as JCR String.
          Used in v1/v2. PN_DRAG_DROP_TEXT in ReservedProperties.
      "fd:dragDropText":
        type: string
        title: Drag-and-drop area text (v3+)
        description: >-
          Label shown in the drag-and-drop zone for v3+.
          Stored as JCR String with fd: namespace. PN_DRAG_DROP_TEXT_V3.
      buttonText:
        type: string
        title: Upload button label
        description: >-
          Custom label for the file upload button. Stored as JCR String.
          Injected by FileInputImpl as PN_BUTTON_TEXT. Default value defined
          by FileInput.DEFAULT_BUTTON_TEXT.
