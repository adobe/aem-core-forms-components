$id: switch.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: Switch JCR Authoring Properties
description: >-
  Properties for the Adaptive Form Switch component (switch field type).
  Switch uses the same checked/unchecked value pattern as Checkbox.
  SwitchImpl extends AbstractCheckboxImpl; the only behavioral difference is
  that enumNames are trimmed to one entry when enableUncheckedValue is false.
allOf:
  - $ref: ../field.authoring.schema.yaml
  - type: object
    properties:
      checkedValue:
        title: On value
        description: Value submitted when switch is in the "on" state.
        oneOf:
          - type: string
          - type: boolean
          - type: number
      uncheckedValue:
        title: Off value
        description: Value submitted when switch is in the "off" state (only when enableUncheckedValue=true).
        oneOf:
          - type: string
          - type: boolean
          - type: number
      enableUncheckedValue:
        type: boolean
        title: Submit value when off
        default: false
        description: >-
          When true, uncheckedValue is submitted when the switch is in the off state.
          Omit from JCR when false — absent property = runtime default false.
