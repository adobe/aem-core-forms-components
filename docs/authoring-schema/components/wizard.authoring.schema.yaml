$id: wizard.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: Wizard JCR Authoring Properties
description: >-
  Properties for the Adaptive Form Wizard component (v1 and v2).
  Extends container.authoring.schema. JCR resource types:
  core/fd/components/form/wizard/v1/wizard and
  core/fd/components/form/wizard/v2/wizard.
  Both versions are backed by PanelImpl and share the same set of
  additional properties.
allOf:
  - $ref: ../container.authoring.schema.yaml
  - type: object
    properties:
      readOnly:
        type: boolean
        title: Read only
        description: >-
          When true the wizard and all its children are rendered as read-only.
          Injected by PanelImpl via PN_READ_ONLY.
      wrapData:
        type: boolean
        title: Wrap data
        description: >-
          When true forces the panel type to "object" regardless of dataRef.
          Injected by PanelImpl via PN_WRAP_DATA. Not included in JSON model
          output (@JsonIgnore); affects getType() logic only.
      breakBeforeText:
        type: string
        title: DOR — break before text
        description: >-
          Document of Record page-break control. Injected by PanelImpl via
          PN_BREAK_BEFORE_TEXT.
      breakAfterText:
        type: string
        title: DOR — break after text
        description: >-
          Document of Record page-break control. Injected by PanelImpl via
          PN_BREAK_AFTER_TEXT.
      overflowText:
        type: string
        title: DOR — overflow text
        description: >-
          Document of Record overflow handling. Injected by PanelImpl via
          PN_OVERFLOW_TEXT.
