$id: recaptcha.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: reCAPTCHA JCR Authoring Properties
description: >-
  Properties for the Adaptive Form Google reCAPTCHA component (v1).
  RecaptchaImpl extends AbstractCaptchaImpl which extends AbstractFieldImpl,
  so it inherits all field and base properties. The two component-specific
  properties point to the cloud service configuration and control the widget
  display size. Note that RecaptchaImpl uses a different JCR property name
  for cloud service path ("rcCloudServicePath") than hCaptcha/Turnstile
  ("cloudServicePath") — this is intentional and historically fixed.
  JCR resource type: core/fd/components/form/recaptcha/v1/recaptcha
allOf:
  - $ref: ../field.authoring.schema.yaml
  - type: object
    properties:
      rcCloudServicePath:
        type: string
        title: reCAPTCHA cloud service configuration path
        description: >-
          JCR path to the cloud configuration resource that holds the reCAPTCHA
          site key, secret key, and version (v2 or enterprise). At runtime
          RecaptchaImpl resolves the ReCaptchaConfigurationModel from this path
          via CloudConfigurationProvider. Injected via
          ReservedProperties.PN_RECAPTCHA_CLOUD_SERVICE_PATH ("rcCloudServicePath").
          Note: this property name differs from the "cloudServicePath" used by
          hCaptcha and Turnstile.
      recaptchaSize:
        type: string
        title: reCAPTCHA widget size
        description: >-
          Controls the visual size of the reCAPTCHA widget. Valid for reCAPTCHA v2
          and reCAPTCHA Enterprise checkbox keys; disabled for score-based (invisible)
          Enterprise keys. Common values: "normal", "compact". Injected by
          RecaptchaImpl via ReservedProperties.PN_RECAPTCHA_SIZE ("recaptchaSize").
          Stored as JCR String.
        enum:
          - normal
          - compact
