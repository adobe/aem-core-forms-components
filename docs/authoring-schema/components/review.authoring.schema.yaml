$id: review.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: Review JCR Authoring Properties
description: >-
  Properties for the Adaptive Form Review component (v1).
  ReviewImpl extends AbstractBaseImpl directly (not AbstractFieldImpl or
  AbstractContainerImpl), so it inherits only the base properties.
  The two component-specific properties are stored under the fd: namespace
  and are written dynamically to the JSON model's custom properties map
  via getProperties(). The component renders a read-only review of all or
  specific linked panels in the form.
  JCR resource type: core/fd/components/form/review/v1/review
allOf:
  - $ref: ../base.authoring.schema.yaml
  - type: object
    properties:
      "fd:linkedPanels":
        type: array
        items:
          type: string
        title: Linked panels
        description: >-
          Array of panel paths (or names) that this Review component should
          display. When empty or absent the component renders the entire form.
          Injected by ReviewImpl as String[] via @ValueMapValue with name
          "fd:linkedPanels". Stored as JCR multi-value String property.
          Written to the JSON model properties map under key "fd:linkedPanels"
          by getProperties().
      "fd:editModeAction":
        type: string
        title: Edit mode action
        description: >-
          Specifies the edit action available in review mode. Controls whether
          the user can edit individual fields, entire panels, both, or neither.
          Injected by ReviewImpl as String via @ValueMapValue with name
          "fd:editModeAction". Stored as JCR String. Written to the JSON model
          properties map under key "fd:editModeAction" by getProperties().
