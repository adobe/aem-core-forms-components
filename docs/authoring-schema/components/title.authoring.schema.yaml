$id: title.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: Title JCR Authoring Properties
description: >-
  Properties for the Adaptive Form Title component. v1 uses base properties only.
  v2 adds fd:htmlelementType for choosing the rendered HTML heading element.
allOf:
  - $ref: ../base.authoring.schema.yaml
  - type: object
    properties:
      "fd:htmlelementType":
        type: string
        title: HTML element type (v2 only)
        description: >-
          Determines the rendered heading element (h1–h6, p, etc.).
          Injected by TitleImpl v2 as PN_HTML_ELEMENT_TYPE_V2 ("fd:htmlelementType").
          Only present in v2; absent in v1.
        enum: [h1, h2, h3, h4, h5, h6, p]
