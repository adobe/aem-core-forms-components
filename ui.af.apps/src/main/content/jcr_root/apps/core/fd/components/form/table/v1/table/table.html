<sly data-sly-use.table="com.adobe.cq.forms.core.components.models.form.Panel"
     data-sly-use.formstructparser="com.adobe.cq.forms.core.components.models.form.FormStructureParser"></sly>

<div class="cmp-adaptiveform-table cmp-container"
     id="${table.id}"
     data-cmp-is="adaptiveFormTable"
     data-cmp-adaptiveformcontainer-path="${formstructparser.formContainerPath}"
     data-cmp-visible="${table.visible ? 'true' : 'false'}"
     data-cmp-enabled="${table.enabled ? 'true' : 'false'}">
    
    <sly data-sly-test="${table.label.visible}">
        <div class="cmp-adaptiveform-table__title cmp-container__label">${table.label.value @ context='html'}</div>
    </sly>
    
    <sly data-sly-test="${table.description}">
        <div class="cmp-adaptiveform-table__description cmp-container__longdescription">${table.description @ context='html'}</div>
    </sly>

    <!--/* EDIT MODE: semantic table elements; tr decoration lets AEM inject edit chrome. */-->
    <sly data-sly-test="${wcmmode.edit}">
        <table class="cmp-adaptiveform-table__widget"
               aria-label="${table.label.value @ context='attribute'}">
            <thead class="cmp-adaptiveform-table__head">
                <sly data-sly-list.child="${resource.listChildren}">
                    <sly data-sly-test="${child.resourceType == 'core/fd/components/form/tableheader/v1/tableheader'}">
                        <sly data-sly-resource="${child @ decorationTagName='tr', cssClassName='cmp-adaptiveform-tableheader'}"></sly>
                    </sly>
                </sly>
            </thead>
            <tbody class="cmp-adaptiveform-table__body">
                <sly data-sly-list.child="${resource.listChildren}">
                    <sly data-sly-test="${child.resourceType == 'core/fd/components/form/tablerow/v1/tablerow'}">
                        <sly data-sly-resource="${child @ decorationTagName='tr', cssClassName='cmp-adaptiveform-tablerow'}"></sly>
                    </sly>
                </sly>
            </tbody>
        </table>
    </sly>
    <!--/* PUBLISH MODE: proper semantic table elements for accessibility and SEO. */-->
    <sly data-sly-test="${!wcmmode.edit}">
        <table class="cmp-adaptiveform-table__widget"
               aria-label="${table.label.value @ context='attribute'}">
            <thead class="cmp-adaptiveform-table__head">
                <sly data-sly-list.child="${resource.listChildren}">
                    <sly data-sly-test="${child.resourceType == 'core/fd/components/form/tableheader/v1/tableheader'}">
                        <sly data-sly-resource="${child @ decoration=false}"></sly>
                    </sly>
                </sly>
            </thead>
            <tbody class="cmp-adaptiveform-table__body">
                <sly data-sly-list.child="${resource.listChildren}">
                    <sly data-sly-test="${child.resourceType == 'core/fd/components/form/tablerow/v1/tablerow'}">
                        <sly data-sly-resource="${child @ decoration=false}"></sly>
                    </sly>
                </sly>
            </tbody>
        </table>
    </sly>
</div>
