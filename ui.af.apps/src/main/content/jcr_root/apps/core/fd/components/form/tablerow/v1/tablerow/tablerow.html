<sly data-sly-use.row="com.adobe.cq.forms.core.components.models.form.Panel"
     data-sly-use.formstructparser="com.adobe.cq.forms.core.components.models.form.FormStructureParser"></sly>
<!--/*
    EDIT MODE: div cells inside AEM's decoration <div class="cq-Editable-dom cmp-adaptiveform-tablerow">.
    The decoration div uses display:flex (from tableeditor.css). Each cell div is a flex item.
*/-->
<sly data-sly-test="${wcmmode.edit}">
    <sly data-sly-list.cell="${resource.listChildren}">
        <div class="cmp-adaptiveform-tablecell">
            <sly data-sly-resource="${cell @ decorationTagName='div'}"></sly>
        </div>
    </sly>
</sly>
<!--/* PUBLISH MODE: semantic <tr>/<td> with repeatable row controls. */-->
<sly data-sly-test="${!wcmmode.edit}">
    <tr id="${row.id}"
        class="cmp-adaptiveform-tablerow cmp-adaptiveform-tablerow__root"
        data-cmp-is="adaptiveFormTableRow"
        data-cmp-adaptiveformcontainer-path="${formstructparser.formContainerPath}"
        data-cmp-visible="${row.visible ? 'true' : 'false'}"
        data-cmp-enabled="${row.enabled ? 'true' : 'false'}"
        data-cmp-readonly="${row.readOnly ? 'true' : 'false'}">
        <sly data-sly-list.cell="${resource.listChildren}">
            <td class="cmp-adaptiveform-tablecell${row.repeatable && cellList.last ? ' cmp-adaptiveform-tablecell--with-row-controls' : ''}">
                <sly data-sly-resource="${cell @ decorationTagName='div'}"></sly>
                <sly data-sly-test="${row.repeatable && cellList.last}">
                    <div class="cmp-adaptiveform-tablerow__runtime-controls"
                         role="group">
                        <button type="button"
                                class="cmp-adaptiveform-tablerow__add-button"
                                data-cmp-hook-add-instance
                                title="Add row"
                                aria-label="Add row"></button>
                        <button type="button"
                                class="cmp-adaptiveform-tablerow__remove-button"
                                data-cmp-hook-remove-instance
                                title="Remove row"
                                aria-label="Remove row"></button>
                    </div>
                </sly>
            </td>
        </sly>
    </tr>
</sly>
