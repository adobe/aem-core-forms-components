<template data-sly-template.widget="${ @ imagechoice, widgetId }">
    <div class="cmp-adaptiveform-imagechoice__widget ${imagechoice.orientation.value}"
         id="${widgetId}"
         role="${imagechoice.fieldType == 'checkbox-group' ? 'group' : 'radiogroup'}"
         aria-required="${imagechoice.required ? 'true' : 'false'}">
        <div data-sly-list="${imagechoice.enums}" data-sly-unwrap>
            <div class="cmp-adaptiveform-imagechoice__option">
                <label class="cmp-adaptiveform-imagechoice__option-label"
                       title="${imagechoice.tooltipVisible ? '' : imagechoice.tooltipText}">
                    <input type="${imagechoice.fieldType == 'checkbox-group' ? 'checkbox' : 'radio'}"
                           name="${imagechoice.name}"
                           class="cmp-adaptiveform-imagechoice__option__widget"
                           value="${item.toString}"
                           disabled="${!imagechoice.enabled || imagechoice.readOnly}"
                           checked="${imagechoice.fieldType == 'checkbox-group' ? imagechoice.enums[itemList.index] in imagechoice.default : imagechoice.enums[itemList.index] == imagechoice.default[0]}"
                           aria-readonly="${imagechoice.readOnly ? 'true' : ''}"
                           aria-label="${imagechoice.optionScreenReaderLabels[itemList.index]}"
                           tabindex="0"/>
                    <span class="cmp-adaptiveform-imagechoice__option-image"
                          data-sly-test="${imagechoice.imageSrc}">
                        <img src="${imagechoice.imageSrc[itemList.index]}"
                             alt="${imagechoice.enumNames[itemList.index] @ context='text'}"
                             class="cmp-adaptiveform-imagechoice__image"/>
                    </span>
                    <span class="cmp-adaptiveform-imagechoice__option-text">${imagechoice.enumNames[itemList.index] @ context = 'html'}</span>
                </label>
            </div>
        </div>
    </div>
</template>
