<sly data-sly-use.summarystep="com.adobe.cq.forms.core.components.models.form.SummaryStep"
     data-sly-use.renderer="${'summarystep.js'}"
     data-sly-use.clientlib="${'/libs/granite/sightly/templates/clientlib.html'}"
     data-sly-use.templates="core/wcm/components/commons/v1/templates.html">
</sly>

<div data-sly-use.formstructparser="com.adobe.cq.forms.core.components.models.form.FormStructureParser"
     class="cmp-adaptiveform-summarystep"
     data-cmp-is="adaptiveFormSummaryStep"
     data-cmp-visible="${summarystep.visible ? 'true' : 'false'}"
     data-cmp-enabled="${summarystep.enabled ? 'true' : 'false'}"
     id="${summarystep.id}"
     data-cmp-adaptiveformcontainer-path="${formstructparser.formContainerPath}">

    <div class="cmp-adaptiveform-summarystep__title"
         data-sly-test="${summarystep.label.value}">${summarystep.label.value @ context='text'}</div>

    <div class="cmp-adaptiveform-summarystep__content">
        <div class="cmp-adaptiveform-summarystep__message"
             data-sly-test="${summarystep.displayMsg}">${summarystep.displayMsg @ context='html'}</div>
    </div>

</div>
<sly data-sly-call="${templates.placeholder @ isEmpty = true}"></sly>
