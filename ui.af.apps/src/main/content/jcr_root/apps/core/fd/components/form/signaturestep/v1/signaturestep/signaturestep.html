<sly data-sly-use.signaturestep="com.adobe.cq.forms.core.components.models.form.SignatureStep"
     data-sly-use.renderer="${'signaturestep.js'}"
     data-sly-use.clientlib="${'/libs/granite/sightly/templates/clientlib.html'}"
     data-sly-use.templates="core/wcm/components/commons/v1/templates.html">
</sly>

<div data-sly-use.formstructparser="com.adobe.cq.forms.core.components.models.form.FormStructureParser"
     class="cmp-adaptiveform-signaturestep"
     data-cmp-is="adaptiveFormSignatureStep"
     data-cmp-visible="${signaturestep.visible ? 'true' : 'false'}"
     data-cmp-enabled="${signaturestep.enabled ? 'true' : 'false'}"
     id="${signaturestep.id}"
     data-cmp-adaptiveformcontainer-path="${formstructparser.formContainerPath}">

    <!-- Title header — mirrors the foundation signature step card layout -->
    <div class="cmp-adaptiveform-signaturestep__header">
        <span class="cmp-adaptiveform-signaturestep__title">${signaturestep.label.value @ context='text'}</span>
    </div>

    <!-- Body: loading message, Adobe Sign iframe, or error message -->
    <div class="cmp-adaptiveform-signaturestep__body">

        <div class="cmp-adaptiveform-signaturestep__template-message"
             data-sly-test="${signaturestep.displayMsg}">${signaturestep.displayMsg @ context='text'}</div>

        <!-- src is set by JS after the signing URL is obtained from the server -->
        <iframe class="cmp-adaptiveform-signaturestep__iframe"
                title="Adobe Sign"
                frameborder="0"
                style="display:none;"></iframe>

        <!-- Shown by JS on agreement fetch failure -->
        <div class="cmp-adaptiveform-signaturestep__error" style="display:none;"></div>

    </div>

</div>
<sly data-sly-call="${templates.placeholder @ isEmpty = true}"></sly>
