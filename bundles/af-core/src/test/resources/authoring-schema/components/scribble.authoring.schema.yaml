$id: scribble.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: Scribble JCR Authoring Properties
description: >-
  Properties for the Adaptive Form Scribble (signature) component.
  Scribble renders with fieldType "file-input" and fd:viewType "signature".
allOf:
  - $ref: ../field.authoring.schema.yaml
  - type: object
    properties:
      "fd:dialogLabel":
        type: string
        title: Dialog label
        description: >-
          Label shown at the top of the Scribble authoring/capture dialog
          (e.g. "Please sign here"). Injected by ScribbleImpl as FD_DIALOG_LABEL.
          Stored as JCR String. Default value defined by Scribble.DEFAULT_DIALOG_LABEL.
          Exported via getProperties() under the same "fd:dialogLabel" key.
      format:
        type: string
        title: Data format hint
        description: >-
          General format hint for the scribble data type (e.g. "data-url").
          Injected by ScribbleImpl as PN_FORMAT. Distinct from displayFormat/dataFormat
          on AbstractFieldImpl. Stored as JCR String. Included in JSON model output
          via @JsonInclude(NON_NULL).
