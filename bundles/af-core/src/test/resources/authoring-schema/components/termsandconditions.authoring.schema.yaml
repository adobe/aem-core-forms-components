$id: termsandconditions.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: Terms and Conditions JCR Authoring Properties
description: >-
  Properties for the Adaptive Form Terms and Conditions component (v1).
  TermsAndConditionsImpl extends PanelImpl (a container), so it inherits
  all container and base properties. The three component-specific boolean
  flags control which child nodes are rendered and how consent is presented.
  JCR resource type: core/fd/components/form/termsandconditions/v1/termsandconditions
allOf:
  - $ref: ../container.authoring.schema.yaml
  - type: object
    properties:
      showApprovalOption:
        type: boolean
        title: Show approval option
        default: true
        description: >-
          When true an approval/consent checkbox is rendered inside the component,
          allowing the user to explicitly accept the terms. When false the checkbox
          is omitted. Injected by TermsAndConditionsImpl via
          ReservedProperties.PN_SHOW_APPROVAL_OPTION ("showApprovalOption").
          Stored as JCR Boolean. Decorated with @JsonIgnore — consumed by the
          component's HTL template rather than exported to the JSON model.
      showLink:
        type: boolean
        title: Show links instead of text content
        default: false
        description: >-
          When true the component renders checkboxGroup children (links) rather
          than plain-text children. TermsAndConditionsImpl filters child resources
          based on this flag in getFilteredChildrenResources(). Injected via
          ReservedProperties.PN_SHOW_LINK ("showLink"). Stored as JCR Boolean.
          Decorated with @JsonIgnore — not exported to the JSON model.
      showAsPopup:
        type: boolean
        title: Show terms content as modal popup
        default: false
        description: >-
          When true the terms content is displayed inside a modal dialog overlay
          rather than inline. Injected by TermsAndConditionsImpl via
          ReservedProperties.PN_SHOW_AS_POPUP ("showAsPopup"). Stored as JCR Boolean.
          Decorated with @JsonIgnore — not exported to the JSON model.
