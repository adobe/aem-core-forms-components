$id: hcaptcha.authoring.schema
$schema: "http://json-schema.org/draft-07/schema#"
title: hCaptcha JCR Authoring Properties
description: >-
  Properties for the Adaptive Form hCaptcha component (v1).
  HCaptchaImpl extends AbstractCaptchaImpl which extends AbstractFieldImpl,
  so it inherits all field and base properties. The two component-specific
  properties point to the cloud service configuration and control the widget
  display size. At runtime HCaptchaImpl resolves the HCaptchaConfiguration
  from the cloud service path via CloudConfigurationProvider to obtain the
  site key and client-side JS URL.
  JCR resource type: core/fd/components/form/hcaptcha/v1/hcaptcha
allOf:
  - $ref: ../field.authoring.schema.yaml
  - type: object
    properties:
      cloudServicePath:
        type: string
        title: hCaptcha cloud service configuration path
        description: >-
          JCR path to the cloud configuration resource that holds the hCaptcha
          site key and client-side JS URL. At runtime HCaptchaImpl resolves the
          HCaptchaConfiguration from this path via CloudConfigurationProvider.
          Injected via ReservedProperties.PN_CLOUD_SERVICE_PATH ("cloudServicePath").
      size:
        type: string
        title: hCaptcha widget size
        description: >-
          Controls the visual size/style of the hCaptcha widget. Injected by
          HCaptchaImpl via ReservedProperties.PN_SIZE ("size"). Stored as JCR String.
          Common values depend on hCaptcha's supported size parameter.
